name: PR Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Check lockfile
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Run Ruff checks
        run: uv run ruff check .
      - name: Run Ruff format check
        run: uv run ruff format --check .
  tests-core:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Check lockfile
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Run core tests
        run: uv run pytest -q -m core tests
  tests-integration:
    runs-on: ubuntu-latest
    needs: tests-core
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Check lockfile
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Run deterministic integration regressions
        run: uv run pytest -q -m integration tests
  typecheck:
    runs-on: ubuntu-latest
    needs: tests-integration
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Check lockfile
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Run mypy
        run: uv run mypy src tests
